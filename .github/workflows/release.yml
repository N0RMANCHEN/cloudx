name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: ./verify.sh
      - name: Verify release tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: test "$GITHUB_REF_NAME" = "v$(cat VERSION)"
      - name: Load signing key
        env:
          RELEASE_KEY: ${{ secrets.CLOUDX_RELEASE_SIGNING_KEY }}
        run: |
          install -m 0700 -d "$RUNNER_TEMP/cloudx-signing"
          printf '%s\n' "$RELEASE_KEY" > "$RUNNER_TEMP/cloudx-signing/key"
          chmod 0600 "$RUNNER_TEMP/cloudx-signing/key"
      - name: Build signed release
        run: |
          python3 scripts/create_release.py \
            --output dist/release \
            --signing-key "$RUNNER_TEMP/cloudx-signing/key" \
            --allowed-signers release/allowed_signers
          version="$(cat VERSION)"
          python3 scripts/create_stable_index.py \
            "dist/release/$version" \
            --signing-key "$RUNNER_TEMP/cloudx-signing/key" \
            --output dist/stable
      - name: Verify signed release evidence
        run: |
          version="$(cat VERSION)"
          python3 scripts/verify_release.py "dist/release/$version" \
            --allowed-signers release/allowed_signers
          python3 -c 'import json, os, pathlib; version=pathlib.Path("VERSION").read_text().strip(); manifest=json.loads(pathlib.Path("dist/release", version, "manifest.json").read_text()); assert manifest["sourceCommit"] == os.environ["GITHUB_SHA"]'
          CLOUDX_USER_HOME="$RUNNER_TEMP/cloudx-release-check" \
            python3 "dist/release/$version/cloudx-local-$version.pyz" \
            update check --index-dir dist/stable --quiet
      - name: Publish signed Git refs
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          version="$(cat VERSION)"
          python3 scripts/publish_release_refs.py "dist/release/$version" dist/stable
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            dist/release/*/*
            dist/release/*-offline.tar.gz
